<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graphe de Compétences 2D</title>
  <style>
    body { margin: 0; background-color: #242222; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif; }
    #title { position: absolute; top: 15px; left: 15px; color: #00d4ff; z-index: 10; pointer-events: none; }
    #title h1 { margin: 0; font-size: 20px; text-shadow: 0 0 5px rgba(0,212,255,0.7); }
    #title p { margin: 5px 0 0; font-size: 12px; color: #ccc; }
  </style>

  <script src="https://unpkg.com/force-graph@1.43.3/dist/force-graph.min.js"></script>
</head>
<body>

  <div id="title">
    <h1>Mes Compétences</h1>
    <p>Molette pour zoomer • Maintenir le clic pour déplacer</p>
  </div>
  
  <div id="graph"></div>

        // DONNÉES IMPORTÉES DE data.js   
    <script src="data.js"></script>
    <script>
     

    // ==========================================
    // 2. CONFIGURATION DU MOTEUR DU GRAPHE 2D
    // ==========================================
    const Graph = ForceGraph()
      (document.getElementById('graph'))
        .graphData(myData)
        .backgroundColor('#242222')
        .nodeAutoColorBy('group')
        .linkDirectionalParticles(2) // Particules animées sur les liens
        .linkDirectionalParticleSpeed(0.005)
        .linkColor(() => 'rgba(255,255,255,0.2)')
        
        // Remplacement des points par du texte natif (Canvas 2D)
        .nodeCanvasObject((node, ctx, globalScale) => {
          const label = node.id;
          
          // Tailles dynamiques selon l'importance
          const fontSize = node.type === 'central' ? 16 : (node.type === 'category' ? 12 : 8);
          ctx.font = `bold ${fontSize}px Sans-Serif`;
          
          // Ajout d'un léger fond noir derrière le texte pour la lisibilité
          const textWidth = ctx.measureText(label).width;
          const bckgDimensions = [textWidth, fontSize].map(n => n + fontSize * 0.4); 

          ctx.fillStyle = 'rgba(36, 34, 34, 0.8)';
          ctx.fillRect(node.x - bckgDimensions[0] / 2, node.y - bckgDimensions[1] / 2, bckgDimensions[0], bckgDimensions[1]);

          // Dessin du texte
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = node.color; // Couleur définie par le groupe
          ctx.fillText(label, node.x, node.y);

          // Sauvegarde des dimensions pour la zone de clic
          node.__bckgDimensions = bckgDimensions; 
        })
        
        // Définir la zone réactive au clic autour du texte
        .nodePointerAreaPaint((node, color, ctx) => {
          ctx.fillStyle = color;
          const bckgDimensions = node.__bckgDimensions;
          if (bckgDimensions) {
            ctx.fillRect(node.x - bckgDimensions[0] / 2, node.y - bckgDimensions[1] / 2, bckgDimensions[0], bckgDimensions[1]);
          }
        })
        
        // Comportement au clic : Zoomer et centrer
        .onNodeClick(node => {
          Graph.centerAt(node.x, node.y, 1000);
          Graph.zoom(3, 2000);
        });

    // Ajustement de la physique pour bien écarter le texte
    Graph.d3Force('charge').strength(-70);
    Graph.d3Force('link').distance(80);

    // Forcer le graphe à rester au centre de l'écran (optionnel mais utile)
    Graph.d3Force('center', d3.forceCenter());
    // Empêche les nœuds de se chevaucher (rayon de collision de 15px)
    Graph.d3Force('collide', d3.forceCollide(15));

    // Ajuster le zoom automatiquement pour tout voir au démarrage   
    Graph.onEngineStop(() => {
    Graph.zoomToFit(400, 50); // 400ms d'animation, 50px de marge
    });

  </script>
</body>
</html>
