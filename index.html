<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Réseau de Compétences 3D</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #title { 
            position: absolute; top: 20px; left: 20px; color: #00d4ff; 
            z-index: 10; pointer-events: none; 
        }
        #title h1 { margin: 0; font-size: 1.2rem; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="title">
        <h1>Compétences Industrielles</h1>
        <small style="color: #666;">Cliquez sur un mot pour zoomer</small>
    </div>
    <div id="3d-graph"></div>

    <script type="module">
        // On importe tout via esm.sh qui gère les dépendances (comme DragControls) tout seul
        import ForceGraph3D from 'https://esm.sh/3d-force-graph';
        import SpriteText from 'https://esm.sh/three-spritetext';

        const gData = {
            nodes: [
                { id: "PROFIL", group: 0, size: 10 },
                // Catégories
                { id: "Techniques", group: 1, size: 8 },
                { id: "Soft Skills", group: 2, size: 8 },
                { id: "Intérêts", group: 3, size: 8 },
                // Compétences Techniques
                { id: "Amélioration continue", group: 1 }, { id: "Lean", group: 1 },
                { id: "5S", group: 1 }, { id: "Kaizen", group: 1 }, { id: "VSM", group: 1 },
                { id: "Transfert industriel", group: 1 }, { id: "Gestion de projet", group: 1 },
                { id: "Industrialisation", group: 1 }, { id: "Méthodes / procédés", group: 1 },
                { id: "Management d’équipe", group: 1 }, { id: "AMDEC", group: 1 },
                { id: "SAP", group: 1 }, { id: "Excel", group: 1 }, { id: "Power BI", group: 1 },
                { id: "MS Project", group: 1 },
                // Soft Skills
                { id: "Résolution de problèmes", group: 2 }, { id: "Intelligence émotionnelle", group: 2 },
                { id: "Créativité", group: 2 }, { id: "Agilité", group: 2 }, { id: "Leadership", group: 2 },
                // Intérêts
                { id: "Programmation", group: 3 }, { id: "Apprentissage autodidacte", group: 3 },
                { id: "DIY / Électronique", group: 3 }, { id: "Anglais (Pro)", group: 4 }
            ],
            links: [
                { source: "PROFIL", target: "Techniques" },
                { source: "PROFIL", target: "Soft Skills" },
                { source: "PROFIL", target: "Intérêts" },
                { source: "Techniques", target: "Amélioration continue" },
                { source: "Amélioration continue", target: "Lean" },
                { source: "Lean", target: "5S" }, { source: "Lean", target: "Kaizen" },
                { source: "Techniques", target: "Gestion de projet" },
                { source: "Gestion de projet", target: "Power BI" },
                { source: "Soft Skills", target: "Leadership" }
            ]
        };

        const Graph = ForceGraph3D()(document.getElementById('3d-graph'))
            .graphData(gData)
            .nodeAutoColorBy('group')
            .backgroundColor('#000000')
            .showNavInfo(false)
            // On remplace la sphère par le texte
            .nodeThreeObject(node => {
                const sprite = new SpriteText(node.id);
                sprite.color = node.color;
                sprite.textHeight = node.size ? node.size : 4;
                sprite.fontWeight = 'bold';
                return sprite;
            })
            // Interaction mobile : zoom fluide au clic
            .onNodeClick(node => {
                const distance = 80;
                const distRatio = 1 + distance/Math.hypot(node.x, node.y, node.z);
                Graph.cameraPosition(
                    { x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio }, 
                    node, 
                    2000
                );
            });

        // Force d'espacement pour éviter que les mots se chevauchent
        Graph.d3Force('charge').strength(-180);
    </script>
</body>
</html>
